services:
  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    depends_on:
      db-prod:
        condition: service_healthy
    restart: always

  db-prod:
    image: postgres:17-alpine
    env_file:
      - .env.prod
    volumes:
      - pg_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palpadel -d palmpadel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pg_prod:
