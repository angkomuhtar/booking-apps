services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile # pakai Dockerfile prod (versi build)
    ports:
      - "3000:3000"
    env_file:
      - .env.prod
    depends_on:
      db-dev:
        condition: service_healthy
    restart: always

  db-dev:
    image: postgres:17-alpine
    env_file:
      - .env.prod
    volumes:
      - pg_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palmpadel -d palmpadel"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pg_dev:
